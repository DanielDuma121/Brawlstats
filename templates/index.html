<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrawlStats</title>
  <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #FFD700;
      --orange: #FF6B00;
      --pink: #FF3D8B;
      --purple: #7B2FFF;
      --blue: #00CFFF;
      --dark: #0A0A1A;
      --card: #13132A;
      --card2: #1A1A35;
      --border: rgba(255,255,255,0.07);
      --text: #E8E8FF;
      --muted: #7070AA;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* BG animated mesh */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 10%, rgba(123,47,255,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 50% 35% at 80% 90%, rgba(255,61,139,0.15) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 60% 30%, rgba(0,207,255,0.10) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Stars */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 70%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 15%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 75% 55%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 30%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 85%, rgba(255,255,255,0.25) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 960px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    /* HEADER */
    header {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeDown 0.6s ease;
    }

    .logo {
      font-family: 'Lilita One', cursive;
      font-size: clamp(2.4rem, 6vw, 4rem);
      letter-spacing: 2px;
      background: linear-gradient(135deg, var(--gold) 0%, var(--orange) 40%, var(--pink) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      filter: drop-shadow(0 0 24px rgba(255,107,0,0.4));
      line-height: 1;
    }

    .logo span {
      background: linear-gradient(135deg, var(--blue) 0%, var(--purple) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* SEARCH BOX */
    .search-box {
      display: flex;
      gap: 10px;
      max-width: 460px;
      margin: 0 auto 48px;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 6px 6px 6px 20px;
      box-shadow: 0 0 40px rgba(123,47,255,0.15);
      transition: box-shadow 0.3s, border-color 0.3s;
      animation: fadeUp 0.6s ease 0.1s both;
    }

    .search-box:focus-within {
      border-color: rgba(123,47,255,0.6);
      box-shadow: 0 0 60px rgba(123,47,255,0.25);
    }

    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: white;
      font-family: 'Nunito', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .search-box input::placeholder { color: var(--muted); font-weight: 600; }

    .btn-search {
      background: linear-gradient(135deg, var(--purple), var(--pink));
      border: none;
      border-radius: 12px;
      color: white;
      font-family: 'Lilita One', cursive;
      font-size: 0.95rem;
      letter-spacing: 1px;
      padding: 12px 22px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(123,47,255,0.4);
      white-space: nowrap;
    }

    .btn-search:hover { transform: scale(1.04); box-shadow: 0 6px 28px rgba(255,61,139,0.45); }
    .btn-search:active { transform: scale(0.97); }

    /* LOADING */
    #loading {
      display: none;
      text-align: center;
      padding: 60px 20px;
    }

    .loader-ring {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      border: 4px solid rgba(123,47,255,0.2);
      border-top-color: var(--purple);
      border-right-color: var(--pink);
      margin: 0 auto 16px;
      animation: spin 0.9s linear infinite;
    }

    /* ERROR */
    #error-msg {
      display: none;
      text-align: center;
      padding: 24px;
      background: rgba(255,61,139,0.1);
      border: 1px solid rgba(255,61,139,0.3);
      border-radius: 14px;
      color: var(--pink);
      font-weight: 700;
      max-width: 460px;
      margin: 0 auto;
      animation: fadeUp 0.4s ease;
    }

    /* PROFILE */
    #profile { display: none; animation: fadeUp 0.5s ease; }

    .profile-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 28px 28px 24px;
      margin-bottom: 28px;
      position: relative;
      overflow: hidden;
    }

    .profile-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--purple), var(--pink), var(--orange), var(--gold));
    }

    .profile-top {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .avatar {
      width: 70px;
      height: 70px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--purple), var(--pink));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      flex-shrink: 0;
      box-shadow: 0 0 30px rgba(123,47,255,0.4);
    }

    .profile-info { flex: 1; min-width: 180px; }

    .player-name {
      font-family: 'Lilita One', cursive;
      font-size: 1.8rem;
      line-height: 1;
      margin-bottom: 4px;
      color: white;
    }

    .player-tag {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .player-club {
      margin-top: 6px;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--gold);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .trophies-badge {
      margin-left: auto;
      text-align: center;
    }

    .trophy-count {
      font-family: 'Lilita One', cursive;
      font-size: 2.2rem;
      background: linear-gradient(135deg, var(--gold), var(--orange));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .trophy-label {
      font-size: 0.7rem;
      font-weight: 800;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* STATS GRID */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(145px, 1fr));
      gap: 12px;
      margin-top: 22px;
    }

    .stat-card {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stat-icon { font-size: 1.3rem; margin-bottom: 2px; }

    .stat-value {
      font-family: 'Lilita One', cursive;
      font-size: 1.4rem;
      color: white;
      line-height: 1;
    }

    .stat-label {
      font-size: 0.68rem;
      font-weight: 800;
      color: var(--muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    /* SECTION TITLE */
    .section-title {
      font-family: 'Lilita One', cursive;
      font-size: 1.2rem;
      letter-spacing: 1px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: white;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* BRAWLERS GRID */
    .brawlers-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
      gap: 12px;
    }

    .brawler-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 14px 14px 12px;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      cursor: default;
    }

    .brawler-card:hover {
      transform: translateY(-3px) scale(1.02);
      border-color: var(--rarity-color, var(--purple));
      box-shadow: 0 8px 28px rgba(0,0,0,0.35);
    }

    .brawler-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--rarity-color, var(--purple));
      opacity: 0.8;
    }

    .brawler-rarity-bg {
      position: absolute;
      top: 0; right: 0;
      width: 60px; height: 60px;
      background: radial-gradient(circle at top right, var(--rarity-color, var(--purple)), transparent 70%);
      opacity: 0.15;
      pointer-events: none;
    }

    .brawler-name {
      font-family: 'Lilita One', cursive;
      font-size: 0.88rem;
      letter-spacing: 0.5px;
      color: white;
      margin-bottom: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .brawler-power-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 7px;
    }

    .power-badge {
      font-family: 'Lilita One', cursive;
      font-size: 0.75rem;
      background: linear-gradient(135deg, var(--orange), var(--gold));
      color: #000;
      padding: 2px 8px;
      border-radius: 20px;
      letter-spacing: 0.5px;
    }

    .brawler-trophies {
      font-size: 0.78rem;
      font-weight: 800;
      color: var(--gold);
    }

    /* Trophy progress bar */
    .trophy-bar-wrap {
      margin-top: 4px;
    }

    .trophy-bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.62rem;
      font-weight: 800;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .trophy-bar {
      height: 5px;
      background: rgba(255,255,255,0.06);
      border-radius: 99px;
      overflow: hidden;
    }

    .trophy-bar-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--gold), var(--orange));
      transition: width 0.8s cubic-bezier(.4,0,.2,1);
    }

    .brawler-rank {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 0.65rem;
      font-weight: 900;
      color: var(--muted);
    }

    /* RARITY COLORS */
    .rarity-Trophy { --rarity-color: #B0BEC5; }
    .rarity-Super_Rare { --rarity-color: #4FC3F7; }
    .rarity-Rare { --rarity-color: #66BB6A; }
    .rarity-Epic { --rarity-color: #AB47BC; }
    .rarity-Mythic { --rarity-color: #EF5350; }
    .rarity-Legendary { --rarity-color: #FFD700; }
    .rarity-Common { --rarity-color: #90A4AE; }
    .rarity-Chromatic { --rarity-color: #FF7043; }

    /* SORT BAR */
    .sort-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .sort-label {
      font-size: 0.72rem;
      font-weight: 800;
      color: var(--muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .sort-btn {
      background: var(--card2);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Nunito', sans-serif;
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .sort-btn:hover, .sort-btn.active {
      background: rgba(123,47,255,0.2);
      border-color: rgba(123,47,255,0.5);
      color: white;
    }

    /* GADGETS / STAR POWERS */
    .gear-pills {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .gear-pill {
      font-size: 0.6rem;
      font-weight: 800;
      padding: 2px 6px;
      border-radius: 20px;
      letter-spacing: 0.5px;
    }

    .gear-pill.gadget {
      background: rgba(0,207,255,0.15);
      color: var(--blue);
      border: 1px solid rgba(0,207,255,0.3);
    }

    .gear-pill.starpow {
      background: rgba(255,215,0,0.15);
      color: var(--gold);
      border: 1px solid rgba(255,215,0,0.3);
    }

    /* FILTER BAR */
    .filter-section {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 16px 20px;
      margin-bottom: 20px;
    }

    .filter-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    /* ANIMATIONS */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.88); }
      to   { opacity: 1; transform: scale(1); }
    }

    .brawler-card { animation: popIn 0.35s ease both; }

    /* RESPONSIVE */
    @media (max-width: 480px) {
      .profile-top { flex-direction: column; align-items: flex-start; }
      .trophies-badge { margin-left: 0; }
      .brawlers-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
    }
  </style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo">BRAWL<span>STATS</span></div>
    <div class="subtitle">Player Profile Tracker</div>
  </header>

  <div class="search-box">
    <input id="tag" placeholder="#TAG DEL JUGADOR" autocomplete="off" spellcheck="false" />
    <button class="btn-search" onclick="buscar()">⚔️ BUSCAR</button>
  </div>

  <div id="loading">
    <div class="loader-ring"></div>
    <div style="color:var(--muted);font-weight:700;font-size:0.85rem;letter-spacing:2px;text-transform:uppercase">Cargando...</div>
  </div>

  <div id="error-msg"></div>

  <div id="profile">
    <!-- Profile card injected here -->
  </div>

</div>

<script>
let rawBrawlers = [];
let currentSort = 'trophies';

async function buscar() {
  const tag = document.getElementById("tag").value.trim();
  if (!tag) return;

  showLoading(true);
  hideError();
  document.getElementById("profile").style.display = "none";

  try {
    const res = await fetch(`/api/player/${encodeURIComponent(tag)}`);
    const data = await res.json();

    if (data.reason || data.message) {
      showError(data.message || data.reason || "Jugador no encontrado");
      return;
    }

    renderProfile(data);
  } catch (e) {
    showError("Error al conectar con la API. Verifica el tag e inténtalo de nuevo.");
  } finally {
    showLoading(false);
  }
}

document.getElementById("tag").addEventListener("keydown", e => {
  if (e.key === "Enter") buscar();
});

function showLoading(v) {
  document.getElementById("loading").style.display = v ? "block" : "none";
}

function showError(msg) {
  const el = document.getElementById("error-msg");
  el.textContent = "⚠️ " + msg;
  el.style.display = "block";
}

function hideError() {
  document.getElementById("error-msg").style.display = "none";
}

function fmt(n) {
  if (n === undefined || n === null) return "—";
  return n.toLocaleString("es-ES");
}

function rarityClass(rarity) {
  if (!rarity) return '';
  return 'rarity-' + rarity.replace(/\s+/g, '_');
}

function rarityLabel(rarity) {
  const map = {
    'Trophy Road': 'Trophy',
    'Super Rare': 'Super Rare',
    'Rare': 'Rare',
    'Epic': 'Epic',
    'Mythic': 'Mythic',
    'Legendary': 'Legendary',
    'Common': 'Common',
    'Chromatic': 'Chromatic',
  };
  return map[rarity] || rarity || '';
}

function renderProfile(p) {
  rawBrawlers = p.brawlers || [];

  const club = p.club?.name
    ? `<div class="player-club">🏆 ${escHtml(p.club.name)}</div>` : '';

  const highestTrophies = p.highestTrophies != null
    ? `<div class="stat-card"><div class="stat-icon">🏅</div><div class="stat-value">${fmt(p.highestTrophies)}</div><div class="stat-label">Máx. Trofeos</div></div>` : '';

  const expLevel = p.expLevel != null
    ? `<div class="stat-card"><div class="stat-icon">⭐</div><div class="stat-value">${p.expLevel}</div><div class="stat-label">Nivel Exp.</div></div>` : '';

  const wins3v3 = p["3vs3Victories"] != null
    ? `<div class="stat-card"><div class="stat-icon">⚔️</div><div class="stat-value">${fmt(p["3vs3Victories"])}</div><div class="stat-label">Victorias 3v3</div></div>` : '';

  const winsSD = p.soloVictories != null
    ? `<div class="stat-card"><div class="stat-icon">🎯</div><div class="stat-value">${fmt(p.soloVictories)}</div><div class="stat-label">Victorias Solo</div></div>` : '';

  const winsDuo = p.duoVictories != null
    ? `<div class="stat-card"><div class="stat-icon">🤝</div><div class="stat-value">${fmt(p.duoVictories)}</div><div class="stat-label">Victorias Dúo</div></div>` : '';

  const bestRobo = p.bestRoboRumbleTime != null
    ? `<div class="stat-card"><div class="stat-icon">🤖</div><div class="stat-value">${p.bestRoboRumbleTime}s</div><div class="stat-label">Mejor Robo</div></div>` : '';

  const bestBigBrawler = p.bestTimeAsBigBrawler != null
    ? `<div class="stat-card"><div class="stat-icon">👹</div><div class="stat-value">${p.bestTimeAsBigBrawler}s</div><div class="stat-label">Big Brawler</div></div>` : '';

  const totalBrawlers = rawBrawlers.length;
  const maxedBrawlers = rawBrawlers.filter(b => b.power === 11).length;

  const html = `
    <div class="profile-card">
      <div class="profile-top">
        <div class="avatar">🎮</div>
        <div class="profile-info">
          <div class="player-name">${escHtml(p.name || "?")}</div>
          <div class="player-tag">${escHtml(p.tag || "")}</div>
          ${club}
        </div>
        <div class="trophies-badge">
          <div class="trophy-count">🏆 ${fmt(p.trophies)}</div>
          <div class="trophy-label">Trofeos</div>
        </div>
      </div>
      <div class="stats-grid">
        ${expLevel}
        ${highestTrophies}
        ${wins3v3}
        ${winsSD}
        ${winsDuo}
        ${bestRobo}
        ${bestBigBrawler}
        <div class="stat-card">
          <div class="stat-icon">🦸</div>
          <div class="stat-value">${totalBrawlers}</div>
          <div class="stat-label">Brawlers</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">💎</div>
          <div class="stat-value">${maxedBrawlers}</div>
          <div class="stat-label">Maxeados</div>
        </div>
      </div>
    </div>

    <div class="filter-section">
      <div class="sort-bar">
        <span class="sort-label">Ordenar:</span>
        <button class="sort-btn active" id="sort-trophies" onclick="setSort('trophies')">🏆 Trofeos</button>
        <button class="sort-btn" id="sort-power" onclick="setSort('power')">⚡ Poder</button>
        <button class="sort-btn" id="sort-name" onclick="setSort('name')">🔤 Nombre</button>
      </div>
    </div>

    <div class="section-title">🦸 BRAWLERS (${totalBrawlers})</div>
    <div class="brawlers-grid" id="brawlers-grid"></div>
  `;

  const el = document.getElementById("profile");
  el.innerHTML = html;
  el.style.display = "block";

  renderBrawlers();
}

function setSort(s) {
  currentSort = s;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sort-' + s).classList.add('active');
  renderBrawlers();
}

function renderBrawlers() {
  const sorted = [...rawBrawlers].sort((a, b) => {
    if (currentSort === 'trophies') return (b.trophies || 0) - (a.trophies || 0);
    if (currentSort === 'power') return (b.power || 0) - (a.power || 0);
    if (currentSort === 'name') return (a.name || '').localeCompare(b.name || '');
    return 0;
  });

  const maxTrophies = sorted.length ? Math.max(...sorted.map(b => b.trophies || 0)) : 1;

  const grid = document.getElementById("brawlers-grid");
  if (!grid) return;

  grid.innerHTML = sorted.map((b, i) => {
    const rc = rarityClass(b.rarity);
    const trophyPct = maxTrophies > 0 ? Math.round(((b.trophies || 0) / maxTrophies) * 100) : 0;
    const gadgets = (b.gadgets || []).length;
    const starPowers = (b.starPowers || []).length;
    const gearPills = [
      gadgets > 0 ? `<span class="gear-pill gadget">⚙️ ${gadgets} Gadget${gadgets > 1 ? 's' : ''}</span>` : '',
      starPowers > 0 ? `<span class="gear-pill starpow">⭐ ${starPowers} SP</span>` : ''
    ].join('');

    const delay = Math.min(i * 30, 600);

    return `
      <div class="brawler-card ${rc}" style="animation-delay:${delay}ms">
        <div class="brawler-rarity-bg"></div>
        <div class="brawler-rank">#${i + 1}</div>
        <div class="brawler-name">${escHtml(b.name || '?')}</div>
        <div class="brawler-power-row">
          <span class="power-badge">PWR ${b.power || '?'}</span>
          <span class="brawler-trophies">🏆 ${fmt(b.trophies)}</span>
        </div>
        <div class="trophy-bar-wrap">
          <div class="trophy-bar-label">
            <span>Trofeos</span>
            <span>${fmt(b.highestTrophies || b.trophies)}</span>
          </div>
          <div class="trophy-bar">
            <div class="trophy-bar-fill" style="width:${trophyPct}%"></div>
          </div>
        </div>
        ${gearPills ? `<div class="gear-pills">${gearPills}</div>` : ''}
      </div>
    `;
  }).join('');
}

function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
</script>
</body>
</html>
